<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Chat</h1>
            </div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="statusTxt">Connecting...</span>
            </div>
        </div>

        <div class="chat-area">
            <div id="chatMessages" class="messages"></div>

            <div class="input-area">
                <button id="sendFileBtn" class="icon-btn" title="Send file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn" title="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
                <input type="file" id="fileInput" style="display: none;">
            </div>
        </div>
    </div>

    <div id="imageConfirmationModal" class="modal-overlay">
        <div class="modal">
            <h3>Send this image?</h3>
            <img id="imagePreview" class="modal-preview">
            <div class="modal-actions">
                <button id="cancelPasteBtn" class="btn btn-secondary">Cancel</button>
                <button id="confirmPasteBtn" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

    <script src="/OAB.js"></script>
    <script src="/index.js"></script>
</body>

</html>
